<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="H&H — Fresh food, custom cakes & party packages. Made with love and delivered to your door.">
  <title>H&H — Food & Cakes Ordering</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
    rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css?v=20260315">
  <link rel="stylesheet" href="css/reset.css?v=20260315">
  <link rel="stylesheet" href="css/layout.css?v=20260315">
  <link rel="stylesheet" href="css/components.css?v=20260315">
  <link rel="stylesheet" href="css/pages.css?v=20260315">
  <link rel="stylesheet" href="css/admin.css?v=20260315">
  <link rel="stylesheet" href="css/dark-mode.css?v=20260315">

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
</head>

<body>
  <div id="app">
    <!-- Loading state -->
    <div class="loading-overlay" id="initial-loader">
      <div class="spinner"></div>
      <p style="color: var(--gray-500); font-size: var(--text-sm);">Loading H&H...</p>
    </div>
  </div>

  <!-- App Entry Point -->
  <script type="module" src="js/app.js?v=20260315"></script>

  <script>
    // Hide loader once app renders
    window.addEventListener('route-rendered', function () {
      var loader = document.getElementById('initial-loader');
      if (loader) loader.remove();
    }, { once: true });
  </script>
</body>

</html>
